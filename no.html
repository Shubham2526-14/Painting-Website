<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carousel Hover Effect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">

<style>

/* section */
.blogs-section-parent{
  padding:50px;
}

/* carousel */
.owl-carousel .item{
  padding:10px;
}

/* blog card wrapper */
.blog{
  position: relative;
}

/* image */
.blog-img{
  height:200px;
  border-radius:10px;
  overflow:hidden;
  position: relative;
  z-index: 2; /* image upar */
}

.blog-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* 🔥 hidden card (peeche) */
.blog-card{
  position:absolute;
  top:0;
  left:0;
  right:0;

  background:pink;
  padding:15px;
  border-radius:10px;

  z-index:1; /* image ke niche */
  transition:0.4s ease;
}

/* hover effect */
.blog:hover .blog-card{
  transform:translateY(120px);
}

/* buttons */
.custom-nav{
  margin-top:20px;
  text-align:right;
}

.custom-nav button{
  padding:10px 15px;
  margin-left:10px;
  border:none;
  background:#d5a749;
  color:#fff;
  cursor:pointer;
}

</style>
</head>

<body>

<section class="blogs-section-parent">

<h2>Our Projects</h2>

<div class="owl-carousel owl-theme">

  <div class="item">
    <div class="blog">
      <div class="blog-img">
        <img src="https://picsum.photos/400/300?1">
      </div>
      <div class="blog-card">
        <h3>Project 1</h3>
        <p>Lorem ipsum dolor sit amet</p>
      </div>
    </div>
  </div>

  <div class="item">
    <div class="blog">
      <div class="blog-img">
        <img src="https://picsum.photos/400/300?2">
      </div>
      <div class="blog-card">
        <h3>Project 2</h3>
        <p>Lorem ipsum dolor sit amet</p>
      </div>
    </div>
  </div>

  <div class="item">
    <div class="blog">
      <div class="blog-img">
        <img src="https://picsum.photos/400/300?3">
      </div>
      <div class="blog-card">
        <h3>Project 3</h3>
        <p>Lorem ipsum dolor sit amet</p>
      </div>
    </div>
  </div>

</div>

<div class="custom-nav">
  <button class="custom-prev">Prev</button>
  <button class="custom-next">Next</button>
</div>

</section>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

<script>

var owl = $('.owl-carousel').owlCarousel({
  loop:true,
  margin:10,
  nav:false,
  dots:false,
  responsive:{
    0:{ items:1 },
    600:{ items:2 },
    1000:{ items:3 }
  }
});

$('.custom-next').click(function(){
  owl.trigger('next.owl.carousel');
});

$('.custom-prev').click(function(){
  owl.trigger('prev.owl.carousel');
});

</script>

</body>
</html>
